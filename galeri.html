    <div class="slideshow-container-3">

    <img src="indofood2.png" alt="Illustration 2" class="slide3" >
    <img src="indofood3.jpg" alt="Illustration 3" class="slide3" >

    <button class="slider-btn prev-btn" onclick="changeSlide(-1)">&#10094;</button>
    <button class="slider-btn next-btn" onclick="changeSlide(1)">&#10095;</button>
</div>

<script>
    let currentSlideIndex = 0;

    function changeSlide(direction) {
        // Grab all images belonging to slide3
        const slides = document.querySelectorAll('.slide3');
        
        // Remove the 'active' class from the current visible image
        slides[currentSlideIndex].classList.remove('active');
        
        // Calculate the next image index
        currentSlideIndex += direction;
        
        // Loop back to the start if you reach the end
        if (currentSlideIndex >= slides.length) {
            currentSlideIndex = 0;
        }
        // Loop back to the end if you press back on the first image
        if (currentSlideIndex < 0) {
            currentSlideIndex = slides.length - 1;
        }
        
        // Add the 'active' class to the new image so it appears
        slides[currentSlideIndex].classList.add('active');
    }
</script>
